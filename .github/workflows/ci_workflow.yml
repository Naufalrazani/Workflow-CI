name: Workflow CI MLProject and Docker Hub

on:
  push:
    branches: ["main", "master"]

permissions:
  contents: write

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLProject (Re-training Model)
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local -P n_estimators=100 -P max_depth=5

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker Image using MLflow
        run: |
          mlflow models build-docker -m MLProject/mlflow_model_local -n ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model:latest

      - name: Update Link File and Commit to GitHub
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model" > "MLProject/docker_hub_link.txt"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add "MLProject/docker_hub_link.txt"
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated update of Docker Hub link [skip ci]"
          git push
